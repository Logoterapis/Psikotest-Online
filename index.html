<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Asesmen HR - Sika Indonesia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <!-- Loading Overlay -->
    <div id="loading-overlay" style="display:none;">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-sika-red mb-4"></div>
        <p class="text-sika-red font-bold animate-pulse text-center px-4">Memproses...<br><span
                class="text-xs text-gray-500 font-normal">Mohon tunggu sebentar.</span></p>
    </div>

    <!-- Custom Modal -->
    <div id="custom-modal-overlay">
        <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-6 fade-in text-center relative">
            <button onclick="closeModal()" class="absolute top-2 right-2 text-slate-400 hover:text-slate-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
            <h3 id="modal-title" class="text-lg font-bold text-slate-800 mb-2">Konfirmasi</h3>
            <div id="modal-content" class="text-slate-600 text-sm mb-6 overflow-y-auto max-h-60 text-left"></div>
            <div id="modal-actions" class="flex gap-3 justify-center"></div>
        </div>
    </div>

    <!-- HEADER -->
    <header class="bg-white border-b-4 border-sika-yellow shadow-sm py-3 px-4 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img id="header-logo" src="" alt="Sika Logo" class="h-8 md:h-10">
            </div>
            <div id="user-badge"
                class="hidden items-center gap-2 md:gap-3 bg-slate-100 pl-2 pr-3 py-1.5 rounded-full border border-slate-200">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span id="header-username"
                    class="text-xs md:text-sm font-semibold text-slate-600 max-w-[100px] truncate">Kandidat</span>
                <button onclick="confirmReset()"
                    class="ml-2 text-[10px] text-sika-red hover:text-red-800 underline">Reset</button>
            </div>
        </div>
    </header>

    <!-- MAIN -->
    <main
        class="flex-grow flex flex-col items-center justify-start md:justify-center p-3 md:p-6 w-full max-w-5xl mx-auto">
        <div class="w-full max-w-xl bg-white rounded-2xl shadow-lg border-t-8 border-sika-red p-6 md:p-8 fade-in">

            <div class="text-center mb-6">
                <h2 class="text-xl md:text-2xl font-bold text-slate-800 mb-2">Portal Asesmen Online</h2>
                <p class="text-slate-500 text-sm">Harap mengisi data diri dengan benar.</p>
            </div>

            <!-- Restore Alert -->
            <div id="restore-alert"
                class="hidden mb-6 bg-yellow-50 border border-sika-yellow p-4 rounded-lg flex flex-col md:flex-row items-center justify-between gap-3">
                <div class="text-sm text-slate-700 text-center md:text-left">
                    <span class="font-bold text-sika-red">Sesi Ditemukan!</span><br>Anda memiliki sesi tes yang belum
                    selesai.
                </div>
                <button onclick="restoreSession()"
                    class="bg-sika-yellow text-black px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-yellow-400 w-full md:w-auto">Lanjutkan</button>
            </div>

            <form onsubmit="submitUserForm(event)" class="space-y-4 md:space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nama Lengkap</label>
                    <input type="text" id="inputName" required
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg outline-none transition focus:ring-2 focus:ring-red-500 focus:border-red-500"
                        placeholder="Isi nama Anda...">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Posisi Dilamar</label>
                    <input type="text" id="inputRole" required
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg outline-none transition focus:ring-2 focus:ring-red-500 focus:border-red-500"
                        placeholder="Contoh: Supervisor">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Usia</label>
                        <input type="number" id="inputAge" required
                            class="w-full px-4 py-3 border border-slate-300 rounded-lg outline-none transition focus:ring-2 focus:ring-red-500 focus:border-red-500"
                            placeholder="Tahun">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Jenis Kelamin</label>
                        <select id="inputGender"
                            class="w-full px-4 py-3 border border-slate-300 rounded-lg outline-none bg-white transition focus:ring-2 focus:ring-red-500 focus:border-red-500">
                            <option value="Laki-laki">Laki-laki</option>
                            <option value="Perempuan">Perempuan</option>
                        </select>
                    </div>
                </div>
                <div class="pt-4">
                    <button type="submit"
                        class="w-full bg-sika-red hover:bg-red-700 text-white font-bold py-3.5 rounded-xl transition shadow-lg active:scale-95">
                        Mulai Sesi Tes
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        window.onload = function () {
            document.getElementById('header-logo').src = DEFAULT_LOGO;
            checkExistingSession();
        };

        function checkExistingSession() {
            const state = getSession();
            if (state && state.userData && state.userData.name) {
                document.getElementById('restore-alert').classList.remove('hidden');
                document.getElementById('restore-alert').classList.add('flex');
            }
        }

        function restoreSession() {
            const state = getSession();
            if (!state) return;
            const section = state.currentSection || 'index';
            if (section === 'wpt') window.location.href = 'wpt.html';
            else if (section === 'papi') window.location.href = 'papi.html';
            else if (section === 'result') window.location.href = 'result.html';
            else window.location.href = 'wpt.html';
        }

        function submitUserForm(e) {
            e.preventDefault();
            const userData = {
                name: document.getElementById('inputName').value,
                role: document.getElementById('inputRole').value,
                age: document.getElementById('inputAge').value,
                gender: document.getElementById('inputGender').value,
                date: new Date().toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' })
            };
            saveSession({
                userData,
                wptAnswers: new Array(50).fill(null),
                papiAnswers: new Array(90).fill(null),
                wptQIndex: 0,
                papiQIndex: 0,
                wptTimeLeft: 12 * 60,
                currentSection: 'wpt'
            });
            window.location.href = 'wpt.html';
        }
    </script>
</body>

</html>
